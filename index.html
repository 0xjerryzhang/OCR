<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 拍屏搜题 (GitHub Pages 版)</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 顶部导航与设置 */
        #header { position: absolute; top: 0; width: 100%; z-index: 10; display: flex; justify-content: space-between; padding: 15px; box-sizing: border-box; }
        .setting-btn { background: rgba(0,0,0,0.5); color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        
        /* 摄像头区 */
        #video-container { position: relative; width: 100%; flex: 1; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 扫描框 */
        .scan-box { position: absolute; width: 80%; height: 40%; border: 2px solid #00E676; border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6); pointer-events: none; }
        .scan-box::after { content: "请将题目对准框内"; position: absolute; top: -30px; width: 100%; text-align: center; color: #00E676; font-size: 14px; text-shadow: 1px 1px 2px black; }
        
        /* 底部控制区 */
        #controls { padding: 20px; background: #222; text-align: center; height: 200px; display: flex; flex-direction: column; justify-content: flex-start; box-sizing: border-box; z-index: 10; }
        #capture-btn { background: #00E676; color: #000; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; margin-bottom: 15px; flex-shrink: 0; }
        #capture-btn:disabled { background: #555; color: #888; }
        
        /* 结果展示区 */
        #result-box { font-size: 14px; line-height: 1.6; text-align: left; overflow-y: auto; color: #ddd; flex: 1; word-wrap: break-word; white-space: pre-wrap; padding: 5px; border-radius: 5px; background: rgba(0,0,0,0.3); }
        
        /* 设置弹窗 */
        #settings-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        #settings-modal input { width: 100%; max-width: 300px; padding: 10px; margin: 15px 0; border-radius: 5px; border: none; outline: none; }
        #settings-modal button { background: #00E676; color: black; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="header">
        <span style="font-weight:bold; text-shadow: 1px 1px 2px black;">AI 搜题</span>
        <button class="setting-btn" onclick="toggleSettings(true)">⚙️ API 设置</button>
    </div>

    <div id="settings-modal">
        <h3>配置 Gemini API Key</h3>
        <p style="font-size:12px; color:#aaa; text-align:center;">
            请填入您的 Google Gemini API Key。<br>该密钥仅保存在您的手机本地浏览器中。
        </p>
        <input type="text" id="api-key-input" placeholder="AIzaSy...">
        <button onclick="saveApiKey()">保存并关闭</button>
    </div>

    <div id="video-container">
        <video id="camera-stream" autoplay playsinline></video>
        <div class="scan-box"></div>
    </div>

    <canvas id="capture-canvas" style="display: none;"></canvas>

    <div id="controls">
        <button id="capture-btn">📷 拍题解答</button>
        <div id="result-box">等待拍摄...</div>
    </div>

    <script>
        const video = document.getElementById('camera-stream');
        const canvas = document.getElementById('capture-canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('capture-btn');
        const resultBox = document.getElementById('result-box');
        
        let apiKey = localStorage.getItem('gemini_api_key') || '';

        // 1. 设置面板逻辑
        function toggleSettings(show) {
            document.getElementById('settings-modal').style.display = show ? 'flex' : 'none';
            if(show) document.getElementById('api-key-input').value = apiKey;
        }

        function saveApiKey() {
            apiKey = document.getElementById('api-key-input').value.trim();
            localStorage.setItem('gemini_api_key', apiKey);
            toggleSettings(false);
            if(apiKey) resultBox.innerText = "API Key 已保存，可以开始拍题了！";
        }

        // 如果没有 Key，强制打开设置
        if(!apiKey) toggleSettings(true);

        // 2. 初始化摄像头 (后置)
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
            } catch (err) {
                resultBox.innerHTML = `<span style="color:#ff5252;">无法访问摄像头。请确保授予了权限。</span>`;
            }
        }

        // 3. 拍照并提取 Base64，调用大模型
        captureBtn.addEventListener('click', async () => {
            if (!apiKey) {
                alert("请先配置 API Key！");
                toggleSettings(true);
                return;
            }
            if (!video.srcObject) return;

            // 截取视频帧
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 导出并去掉 Base64 的前缀部分 "data:image/jpeg;base64," 
            // 提示：压缩率调到0.7能显著提升API上传速度
            const base64Data = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
            
            captureBtn.disabled = true;
            captureBtn.innerText = "⏳ AI 正在看题...";
            resultBox.innerHTML = "正在上传图片并思考中...";

            await callGeminiVisionAPI(base64Data);
        });

        // 4. 调用 Google Gemini 多模态 API (纯前端直连)
        async function callGeminiVisionAPI(base64Image) {
            const modelName = "gemini-1.5-flash"; // 速度最快，适合日常题目
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

            const requestBody = {
                contents: [{
                    parts: [
                        { text: "你是一个极具耐心的全科老师。请仔细阅读图片中的题目。忽略屏幕上的反光和彩色条纹干扰。请直接给出最终答案，随后提供详细的分步解析。" },
                        { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                    ]
                }]
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message || "API 调用错误");
                }

                // 解析 Gemini 返回的文本
                const answerText = data.candidates[0].content.parts[0].text;
                resultBox.innerText = answerText;

            } catch (error) {
                console.error(error);
                resultBox.innerHTML = `<span style="color:#ff5252;">请求失败：${error.message}</span>`;
            } finally {
                captureBtn.disabled = false;
                captureBtn.innerText = "📷 继续拍题";
            }
        }

        // 启动
        window.onload = initCamera;
    </script>
</body>
</html>
